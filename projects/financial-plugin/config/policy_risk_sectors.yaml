    reason: "平台经济监管，反垄断调查"
    wacc_add_on_min: 0.01
    wacc_add_on_max: 0.02
  - sector: "医疗器械"
    reason: "集采压价风险，利润空间收窄"
    wacc_add_on_min: 0.01
    wacc_add_on_max: 0.02
  - sector: "房地产"
    reason: "三条红线后遗症，流动性压力"
    wacc_add_on_min: 0.02
    wacc_add_on_max: 0.05
